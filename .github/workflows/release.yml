name: release

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) to cross-compile binaries
# for macOS/Linux/Windows and attach them to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 Linux cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          name="quotaline-${{ matrix.target }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${name}.zip" "./target/${{ matrix.target }}/release/quotaline.exe"
            echo "ASSET=${name}.zip" >> "$GITHUB_ENV"
          else
            tar -czf "${name}.tar.gz" -C "target/${{ matrix.target }}/release" quotaline
            echo "ASSET=${name}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
